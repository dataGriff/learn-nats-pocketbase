services:
  nats:
    image: nats:2.10-alpine
    command: "--http_port 8222"
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring endpoint
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8090:8090"
    environment:
      - NATS_URL=nats://nats:4222
    volumes:
      - pb_data:/pb_data
    depends_on:
      nats:
        condition: service_healthy

  subscriber:
    build: ./subscriber
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    restart: on-failure

volumes:
  pb_data:
